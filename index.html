<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Children Duty Roster</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&family=Barlow:wght@400;500;600;700;800;900&display=swap');

  :root {
    --green-dark: #114b11;
    --green-mid: #1e6b1e;
    --green-light: #a3ffa3;
    --green-pale: #d4f7d4;
    --yellow: #FFD700;
    --orange: #E67E22;
    --red-light: #ffe3e3;
    --blue-light: #cfe2ff;
    --white: #ffffff;
    --border: #444;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0f0f1a;
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    overflow-x: hidden;
  }

  /* Title Animation */
  h1 {
    font-family: 'Teko', sans-serif;
    color: var(--yellow);
    font-size: 2.5rem;
    letter-spacing: 4px;
    margin-bottom: 18px;
    text-shadow: 0 0 15px rgba(255,215,0,0.5);
    animation: fadeInDown 0.8s ease-out;
  }

  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 22px;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    animation: fadeIn 1s ease-out;
  }

  .controls label {
    color: #fff;
    font-weight: 700;
    font-size: 1.1rem;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .controls select, .controls input[type="date"] {
    background: #0d2b0d;
    color: var(--yellow);
    border: 2px solid var(--green-mid);
    border-radius: 6px;
    padding: 8px 14px;
    font-size: 1rem;
    font-weight: 700;
    font-family: 'Barlow', sans-serif;
    cursor: pointer;
    outline: none;
    transition: all 0.3s ease;
  }

  .controls select:focus, .controls input[type="date"]:focus {
    border-color: var(--yellow);
    box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
  }

  .controls button {
    background: var(--green-mid);
    color: #fff;
    border: 2px solid var(--yellow);
    border-radius: 6px;
    padding: 8px 20px;
    font-size: 1rem;
    font-weight: 700;
    font-family: 'Barlow', sans-serif;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }
  
  .controls button:hover { 
    background: var(--green-dark); 
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(30, 107, 30, 0.4);
  }

  .controls button:active { transform: translateY(1px); }

  .btn-download {
    background: #2980b9 !important;
    border-color: #3498db !important;
  }
  .btn-download:hover {
    background: #1f618d !important;
    box-shadow: 0 5px 15px rgba(52, 152, 219, 0.4) !important;
  }

  /* ===== MAIN ROSTER CARD ===== */
  .roster-card {
    background: #f4faf4;
    border: 4px solid var(--green-dark);
    border-radius: 12px;
    overflow: hidden;
    width: 100%;
    max-width: 860px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    opacity: 0;
  }

  .roster-card.run-animation {
    animation: cardEntrance 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.1) forwards;
  }

  .roster-body {
    display: flex;
    flex-direction: row;
  }

  @media (max-width: 768px) {
    .roster-body { flex-direction: column; }
    .left-section { border-right: none !important; border-bottom: 4px solid var(--green-dark); }
  }

  /* ===== LEFT SECTION ===== */
  .left-section {
    flex: 1.1;
    border-right: 4px solid var(--green-dark);
  }

  .section-header {
    background: var(--green-dark);
    color: var(--white);
    text-align: center;
    font-family: 'Teko', sans-serif;
    font-size: 1.7rem;
    letter-spacing: 2px;
    padding: 8px 0;
    font-weight: 700;
  }

  .children-table {
    width: 100%;
    border-collapse: collapse;
  }

  .children-table th {
    background: #a3dba3;
    color: #000;
    font-weight: 800; /* হেডার আরও বোল্ড */
    font-size: 1.05rem; /* ফন্ট সাইজ বড় করা হয়েছে */
    padding: 10px 8px;
    border: 1px solid var(--border);
    text-align: center;
  }

  .children-table td {
    padding: 8px 10px;
    border: 1px solid #777;
    font-size: 1.05rem; /* বাচ্চাদের নাম ও ১ ডিজিট বড় করা হয়েছে */
    color: #000;
    font-weight: 700; /* ফন্ট ওয়েট বাড়িয়ে বোল্ড করা হয়েছে */
    text-align: center;
  }

  .run-animation .children-table tbody tr {
    animation: rowAppear 0.4s ease-out backwards;
  }

  /* রো এর কালার ম্যাচিং টেক্সট ডার্ক করা হয়েছে ভালো ভিজিবিলিটির জন্য */
  .row-morning { background: var(--green-pale); color: #082e08; }
  .row-both { background: #ffe0b2; color: #7a3700; }
  .row-evening { background: var(--red-light); color: #5c0000; }
  .row-zero { background: #e0e0e0; color: #444; }
  
  .row-total-label td { 
    background: var(--blue-light); 
    font-weight: 800; 
    font-size: 1.1rem;
    color: #002752;
  }
  
  .row-grand td { 
    background: var(--yellow); 
    font-weight: 900; /* ফাইনাল টোটাল এক্সট্রা বোল্ড */
    font-size: 1.15rem;
    color: #000;
  }

    flex:
