<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Children Duty Roster</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&family=Barlow:wght@400;500;600;700;800&display=swap');

:root {
  --green-dark: #1a6b1a;
  --green-mid: #2d8a2d;
  --green-pale: #c8f0c8;
  --yellow: #FFD700;
  --red-light: #ffb3b3;
  --blue-light: #b3d9ff;
}

body{
  background:#1a1a2e;
  font-family:'Barlow',sans-serif;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
  font-size:18px; /* overall readability */
}

h1{
  font-family:'Teko';
  color:var(--yellow);
  letter-spacing:4px;
  font-size:2.5rem;
  font-weight:700;
}

.controls{margin:15px;}

.roster-card{
  background:#e8f5e8;
  border:3px solid var(--green-dark);
  width:100%;
  max-width:860px;
}

.roster-body{display:flex;}

.left-section{flex:1.1;border-right:3px solid var(--green-dark);}
.right-section{flex:1;}

.section-header,.offday-header{
  text-align:center;
  font-family:'Teko';
  font-size:1.4rem;
  padding:6px;
  letter-spacing:2px;
}

.section-header{background:var(--green-dark);color:#fff;}
.offday-header{background:var(--yellow);}

table{width:100%;border-collapse:collapse;}

th{
  background:#b8e8b8;
  font-weight:900;
  font-size:1.1rem;
  letter-spacing:0.5px;
}

td{
  text-align:center;
  padding:7px;
  font-weight:900;
  font-size:1.05rem;
  letter-spacing:0.3px;
}

.row-morning{background:#c8f0c8;}
.row-evening{background:#ffb3b3;}
.row-both{background:#ffe0b2;}

.row-total-label td{
  background:#b3d9ff;
  font-size:1.2rem;
  font-weight:900;
}

.row-grand td{
  background:var(--yellow);
  font-size:1.3rem;
  font-weight:900;
}

.offday-names{
  color:#c0392b;
  font-weight:900;
  font-size:1.2rem;
  letter-spacing:0.5px;
}

.date-cell{
  background:var(--green-mid);
  color:var(--yellow);
  text-align:center;
  font-family:'Teko';
  font-size:1.6rem;
  padding:12px;
}
</style>
</head>

<body>

<h1>📋 CHILDREN DUTY ROSTER</h1>

<div class="controls">
<select id="daySelect">
<option>Saturday</option>
<option>Sunday</option>
<option>Monday</option>
<option>Tuesday</option>
<option>Wednesday</option>
<option>Thursday</option>
<option>Friday</option>
</select>

<input type="date" id="dateInput">
</div>

<div class="roster-card" id="rosterCard"></div>

<script>

const ALL_CHILDREN=[
"Onti","Rida","Runu","Anika","Hasib","Saied","Suikraching",
"Juie","Afrain","Nafisa","Ashik","Abrar","Mou","Arpita","Anila","Ratan","Alvee",
"Yeasmin","Sumaya","Jiniya","Arifa"
];

const rosterData={
Saturday:{
morning:["Juie","Yeasmin","Rida","Anila","Sumaya","Afrain","Alvee"],
evening:["Runu","Mou","Onti","Jiniya","Nafisa","Arifa","Saied","Ashik","Suikraching"],
offday:["Anika","Arpita","Ratan"]
},
Sunday:{
morning:["Yeasmin","Onti","Nafisa","Saied","Anika","Ashik","Suikraching"],
evening:["Juie","Arifa","Afrain","Runu","Arpita","Jiniya","Sumaya","Alvee","Ratan"],
offday:["Mou","Hasib","Anila","Rida"]
},
Monday:{
morning:["Mou","Juie","Sumaya","Runu","Ratan","Alvee","Afrain"],
evening:["Yeasmin","Jiniya","Suikraching","Onti","Ashik","Arpita","Hasib","Anika","Anila","Rida"],
offday:["Saied","Arifa","Nafisa"]
},
Tuesday:{
morning:["Onti","Rida","Runu","Anika","Hasib","Saied","Suikraching"],
evening:["Juie","Afrain","Nafisa","Ashik","Mou","Arpita","Anila","Ratan","Alvee"],
offday:["Yeasmin","Sumaya","Jiniya"]
},
Wednesday:{
morning:["Juie","Yeasmin","Hasib","Nafisa","Anila","Sumaya","Alvee"],
evening:["Mou","Saied","Arifa","Rida","Jiniya","Runu","Anika","Arpita","Suikraching","Ratan"],
offday:["Ashik","Afrain","Onti"]
},
Thursday:{
morning:["Mou","Hasib","Rida","Arpita","Yeasmin","Anika","Saied"],
evening:["Onti","Sumaya","Runu","Nafisa","Anila","Afrain","Jiniya","Arifa","Ashik","Ratan"],
offday:["Juie","Suikraching","Alvee"]
},
Friday:{
morning:["Onti","Mou","Afrain","Anila","Nafisa","Suikraching","Ratan"],
evening:["Sumaya","Jiniya","Saied","Juie","Arifa","Yeasmin","Arpita","Ashik","Rida","Hasib","Anika","Alvee"],
offday:["Runu"]
}
};

function render(){
const day=document.getElementById('daySelect').value;
const data=rosterData[day];

const mSet=new Set(data.morning);
const eSet=new Set(data.evening);

let rows='';

data.morning.forEach(n=>{
if(!eSet.has(n)) rows+=`<tr class="row-morning"><td>${n}</td><td>1</td><td></td></tr>`;
});

data.morning.forEach(n=>{
if(eSet.has(n)) rows+=`<tr class="row-both"><td>${n}</td><td>1</td><td>1</td></tr>`;
});

data.evening.forEach(n=>{
if(!mSet.has(n)) rows+=`<tr class="row-evening"><td>${n}</td><td></td><td>1</td></tr>`;
});

const off=data.offday.join(', ');

document.getElementById('rosterCard').innerHTML=`
<div class="roster-body">

<div class="left-section">
<div class="section-header">CHILDREN</div>
<table>
<tr><th>Name</th><th>Morning</th><th>Evening</th></tr>
${rows}
<tr class="row-total-label"><td>Total</td><td>${data.morning.length}</td><td>${data.evening.length}</td></tr>
<tr class="row-grand"><td colspan="2">TOTAL=</td><td>${data.morning.length+data.evening.length}</td></tr>
</table>
</div>

<div class="right-section">
<div class="offday-header">OFFDAY</div>
<table>
<tr><td class="offday-names">${off}</td></tr>
</table>
<div class="date-cell">${day}</div>
</div>

</div>`;
}

document.getElementById('daySelect').addEventListener('change',render);
render();

</script>

</body>
</html>
